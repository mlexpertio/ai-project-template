repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: pretty-format-json
        args: [--autofix, --indent=2, --no-sort-keys]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint --fix --cache'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|mjs|cjs)$
        pass_filenames: false

      - id: pytest
        name: pytest (backend)
        entry: uv run --project backend pytest
        language: system
        pass_filenames: false
        always_run: true
